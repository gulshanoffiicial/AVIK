<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gulshan Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff6b6b,#6c5ce7,#00cec9);
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h2{
    color:white;
    text-align:center;
    margin-bottom:15px;
}

#display{
    width:100%;
    height:70px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:28px;
    text-align:right;
    padding:10px;
    background:#f1f2f6;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#74b9ff;
    color:white;
}

.operator{
    background:#fdcb6e;
}

.equal{
    background:#00b894;
    color:white;
}

.clear{
    background:#e17055;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">
    <h2> AVIK Calculator </h2>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="number" onclick="append('0')">0</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
</body>
</html>
